name: Build Linux

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm fakeroot \
            python3-pyqt5 python3-pil python3-pymupdf \
            fonts-dejavu-core libxcb-xinerama0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxkbcommon0 \
            libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel pytest pyinstaller \
            pyhanko python-pkcs11 PyQt5 Pillow PyMuPDF cryptography

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Build standalone executable
        run: |
          pyinstaller --onefile --name pdfsigner \
            --add-data "pdfsigner:pdfsigner" \
            --hidden-import pdfsigner \
            --hidden-import PyQt5 \
            --hidden-import PyQt5.QtWidgets \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --hidden-import fitz \
            --hidden-import PIL \
            --hidden-import cryptography \
            --collect-all pdfsigner \
            pdfsigner/__main__.py

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == v* ]]; then VERSION="${VERSION#v}"; fi
          if [[ -z "$VERSION" || "$VERSION" == "main" ]]; then VERSION="1.0.0-ci"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Python packages
        run: |
          python -m build

      - name: Prepare DEB
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PKG_NAME="pdfsigner"
          ARCH="amd64"
          BUILD_DIR="dist/${PKG_NAME}_${VERSION}_${ARCH}"

          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR/DEBIAN"
          mkdir -p "$BUILD_DIR/usr/bin"
          mkdir -p "$BUILD_DIR/usr/share/applications"
          mkdir -p "$BUILD_DIR/usr/share/pixmaps"

          cat > "$BUILD_DIR/DEBIAN/control" << EOF
          Package: ${PKG_NAME}
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: shurshick <noreply@example.com>
          Homepage: https://github.com/shurshick/pdf-signer-linux
          Description: Desktop PDF signing and visible stamp tool for Linux with CryptoPro CSP
           Supports embedded CAdES-BES signatures via PKCS#11, visible stamps,
           signature verification, and CryptoPro diagnostics.
          EOF

          cp dist/pdfsigner "$BUILD_DIR/usr/bin/pdfsigner"
          chmod 755 "$BUILD_DIR/usr/bin/pdfsigner"

          cat > "$BUILD_DIR/usr/share/applications/pdfsigner.desktop" << EOF
          [Desktop Entry]
          Name=PDF Signer Linux
          Comment=Desktop PDF signing and visible stamp tool
          Exec=pdfsigner
          Icon=pdfsigner
          Terminal=false
          Type=Application
          Categories=Utility;Security;
          EOF

          touch "$BUILD_DIR/usr/share/pixmaps/pdfsigner.png"

          dpkg-deb --build "$BUILD_DIR" "dist/pdfsigner_${VERSION}_${ARCH}.deb"

      - name: Prepare RPM
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PKG_NAME="pdfsigner"
          ARCH="x86_64"
          BUILD_DIR="dist/${PKG_NAME}-${VERSION}"

          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR/usr/bin"
          mkdir -p "$BUILD_DIR/usr/share/applications"
          mkdir -p "$BUILD_DIR/usr/share/pixmaps"

          cp dist/pdfsigner "$BUILD_DIR/usr/bin/pdfsigner"
          chmod 755 "$BUILD_DIR/usr/bin/pdfsigner"

          cat > "$BUILD_DIR/usr/share/applications/pdfsigner.desktop" << EOF
          [Desktop Entry]
          Name=PDF Signer Linux
          Comment=Desktop PDF signing and visible stamp tool
          Exec=pdfsigner
          Icon=pdfsigner
          Terminal=false
          Type=Application
          Categories=Utility;Security;
          EOF

          touch "$BUILD_DIR/usr/share/pixmaps/pdfsigner.png"

          fpm -s dir -t rpm \
            -n pdfsigner -v "$VERSION" --iteration 1 \
            --architecture "$ARCH" \
            --description "Desktop PDF signing and visible stamp tool for Linux with CryptoPro CSP" \
            --url "https://github.com/shurshick/pdf-signer-linux" \
            --license "AGPL-3.0-or-later" \
            --maintainer "shurshick" \
            --depends "python3 >= 3.9" \
            --depends "python3-pyqt5" \
            --depends "libxcb-xinerama0" \
            --depends "libxcb-icccm4" \
            --depends "libxcb-image0" \
            --depends "libxcb-keysyms1" \
            --depends "libxcb-randr0" \
            --depends "libxcb-render-util0" \
            --depends "libxcb-shape0" \
            --depends "libxkbcommon0" \
            --depends "libxkbcommon-x11-0" \
            --deb-no-auto-depends \
            -C "$BUILD_DIR" usr

          rm -rf "$BUILD_DIR"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfsigner-${{ steps.version.outputs.version }}
          path: |
            dist/pdfsigner-${{ steps.version.outputs.version }}*.whl
            dist/pdfsigner-${{ steps.version.outputs.version }}*.tar.gz
            dist/pdfsigner_${{ steps.version.outputs.version }}_amd64.deb
            dist/pdfsigner-${{ steps.version.outputs.version }}-1.x86_64.rpm
            dist/pdfsigner

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pdfsigner-${{ steps.version.outputs.version }}*.whl
            dist/pdfsigner-${{ steps.version.outputs.version }}*.tar.gz
            dist/pdfsigner_${{ steps.version.outputs.version }}_amd64.deb
            dist/pdfsigner-${{ steps.version.outputs.version }}-1.x86_64.rpm
            dist/pdfsigner
          generate_release_notes: true
