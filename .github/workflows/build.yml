name: Build Linux

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel pytest PyQt5 Pillow PyMuPDF cryptography

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Build package
        run: |
          python -m build

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "$VERSION" == v* ]]; then VERSION="${VERSION#v}"; fi
          if [[ -z "$VERSION" || "$VERSION" == "main" ]]; then VERSION="1.0.0-ci"; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Prepare DEB
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh ${{ steps.version.outputs.version }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfsigner-${{ steps.version.outputs.version }}
          path: |
            dist/pdfsigner-${{ steps.version.outputs.version }}*.whl
            dist/pdfsigner-${{ steps.version.outputs.version }}*.tar.gz
            packaging/deb/pdfsigner_${{ steps.version.outputs.version }}_amd64.deb

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pdfsigner-${{ steps.version.outputs.version }}*.whl
            dist/pdfsigner-${{ steps.version.outputs.version }}*.tar.gz
            packaging/deb/pdfsigner_${{ steps.version.outputs.version }}_amd64.deb
          generate_release_notes: true
