name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 libgl1-mesa-dev

      - name: Install Python dependencies
        run: |
          pip install -e .
          pip install pytest build

      - name: Test
        run: pytest tests/ -v

      - name: Build wheel
        run: python -m build --wheel

      - name: Build DEB
        run: |
          sudo apt-get install -y dpkg-dev
          VERSION=0.0.0-ci bash packaging/build-deb.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfsigner-ci
          path: |
            dist/*.whl
            dist/*.deb
            dist/*.tar.gz
