name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 libgl1-mesa-dev dpkg-dev rpm

      - name: Install Python build tools
        run: pip install build

      - name: Build wheel
        run: python -m build --wheel --outdir dist

      - name: Build source distribution
        run: python -m build --sdist --outdir dist

      - name: Build DEB
        run: |
          VERSION=${{ inputs.version }} bash packaging/build-deb.sh
        working-directory: ${{ github.workspace }}

      - name: Build RPM
        run: |
          VERSION=${{ inputs.version }} bash packaging/build-rpm.sh
        working-directory: ${{ github.workspace }}

      - name: List dist files
        run: ls -la dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: pdfsigner ${{ inputs.version }} for Linux
          files: |
            dist/pdfsigner-${{ inputs.version }}-py3-none-any.whl
            dist/pdfsigner-${{ inputs.version }}.tar.gz
            dist/pdfsigner_${{ inputs.version }}_amd64.deb
            dist/pdfsigner-${{ inputs.version }}-1.x86_64.rpm
          generate_release_notes: true
