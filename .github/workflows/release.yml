name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyqt5 libgl1-mesa-dev dpkg-dev rpm

      - name: Install Python dependencies
        run: pip install build pyinstaller

      - name: Install application
        run: pip install .

      - name: Build self-contained binary
        run: |
          pyinstaller \
            --onefile \
            --name pdfsigner \
            --hidden-import pdfsigner \
            --hidden-import pdfsigner.gui \
            --hidden-import pdfsigner.signer \
            --hidden-import pdfsigner.stamp \
            --hidden-import pdfsigner.pdfstamp \
            --hidden-import pdfsigner.certstore \
            --hidden-import pdfsigner.settings \
            --hidden-import pdfsigner.diagnostics \
            --hidden-import pdfsigner.applog \
            --collect-all pdfsigner \
            --noconfirm \
            pdfsigner/main.py

      - name: Build DEB (like Go project)
        run: VERSION=${{ inputs.version }} bash packaging/build-deb.sh

      - name: Build RPM (like Go project)
        run: VERSION=${{ inputs.version }} bash packaging/build-rpm.sh

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: pdfsigner ${{ inputs.version }} for Linux
          files: |
            dist/pdfsigner
            dist/pdfsigner_${{ inputs.version }}_amd64.deb
            dist/pdfsigner-${{ inputs.version }}-1.x86_64.rpm
          generate_release_notes: true
